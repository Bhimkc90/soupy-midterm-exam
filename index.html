<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midterm</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="page">

        <header>
            <div class="socials">
                <a href="https://www.facebook.com">
                    <img src="icons/facebook-icon.svg" alt="Facebook">
                </a>
            
                <a href="https://www.instagram.com">
                    <img src="icons/insta-icon.svg" alt="Instagram">
                </a>
            
                <a href="https://www.youtube.com">
                    <img src="icons/yt-icon.svg" alt="YouTube">
                </a>
            </div>

            <div class="brand">
                <h1>Soupy</h1>

                <nav>
                    <ul>
                        <li><a href="https://www.google.com">Shop</a></li>
                        <li><a href="https://www.google.com">Journal</a></li>
                        <li><a href="https://www.google.com">About</a></li>
                        <li><a href="https://www.google.com">Contact</a></li>
                    </ul>
                </nav>
            </div>

            <div class="cart">
                <span id="cartCount">0</span>
                <img src="icons/basket-icon.svg" alt="Basket" class="basket-icon">
            </div>
        </header>

        <main>

            <section class="hero">
                <div class="hero-text">
                    <h2>Soup for every<br>body.</h2>
                    <a href="https://www.google.com" class="shop-btn">Shop now</a>
                </div>

                <div class="hero-image">
                    <img src="images/main-img.jpeg" alt="Soap display">
                </div>
            </section>

            <section class="products">
                <h2>Shop our soaps</h2>

                <div class="product-grid">

                    <div class="product-card">
                        <img src="images/eucalyptus-soup.jpg" alt="Eucalyptus soap">

                        <h3>Eucalyptus and Citrus</h3>
                        <p>$12.00</p>

                        <div class="product-actions">
                            <div class="quantity-control">
                                <button class="minus">-</button>
                                <span class="quantity">1</span>
                                <button class="plus">+</button>
                            </div>

                            <button class="add-cart">Add to cart</button>
                        </div>
                    </div>

                    <div class="product-card">
                        <img src="images/sage-soap.jpg" alt="Sage soap">

                        <h3>Sage and Cedarwood</h3>
                        <p>$12.00</p>

                        <div class="product-actions">
                            <div class="quantity-control">
                                <button class="minus">-</button>
                                <span class="quantity">1</span>
                                <button class="plus">+</button>
                            </div>

                            <button class="add-cart">Add to cart</button>
                        </div>
                    </div>

                    <div class="product-card">
                        <img src="images/sandalwood-soup.jpg" alt="Sandalwood soap">

                        <h3>Sandalwood and Rose</h3>
                        <p>$12.00</p>

                        <div class="product-actions">
                            <div class="quantity-control">
                                <button class="minus">-</button>
                                <span class="quantity">1</span>
                                <button class="plus">+</button>
                            </div>

                            <button class="add-cart">Add to cart</button>
                        </div>
                    </div>

                </div>
            </section>

        </main>

    </div>

    <script src="script.js"></script>
</body>
</html>
